paths:
  /pets:
    get:
      operationId: listPets
      summary: List pets
      description: Returns a list of pets.
      tags:
        - pets
      responses:
        "200":
          description: A list of pets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  age:
                    type: integer
              example:
                age: "not-a-number"
