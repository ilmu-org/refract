name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUSTDOCFLAGS: "-D warnings"

# Cancel in-progress runs for the same ref so pushes to a PR don't queue up.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Cheap checks first (format + lint) ────────────────────────────────────
  check:
    name: Fmt & Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Caches ~/.cargo/registry, ~/.cargo/git, and ./target
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Tests (depends on check passing) ──────────────────────────────────────
  test:
    name: Tests
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --all-features

  # ── Security: known vulnerability audit ───────────────────────────────────
  audit:
    name: Security Audit
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # rustsec/audit-check installs cargo-audit and runs it automatically.
      # It annotates PRs with any advisories found.
      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── License & dependency policy (cargo-deny) ──────────────────────────────
  deny:
    name: Cargo Deny
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # EmbarkStudios/cargo-deny-action installs cargo-deny at a pinned
      # version and runs `cargo deny check` against deny.toml.
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2

  # ── Documentation build ───────────────────────────────────────────────────
  doc:
    name: Docs
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build documentation
        run: cargo doc --no-deps
        # RUSTDOCFLAGS is set globally above (-D warnings)
